<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="./multimedia/BURGER.png">
    <title>Encuéntranos!!</title>
    <!-- Leaflet CSS (mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style_sedes.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN (original) -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="multimedia/BURGER.png" alt="Starbucks Logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <span class="nav-bar"></span>
                <li><a href="sedes.html">Sedes</a></li>
                <span class="nav-bar"></span>
                <li><a href="sobreNosotros.html">Sobre Nosotros</a></li>
                <span class="nav-bar"></span>
                <li><a href="pqrsd.html">Pqrsd</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-layout">
        <!-- Columna izquierda: Lista de tiendas -->
        <div class="stores-column">
            <h1 class="page-title">Tiendas</h1>
            
            <div class="location-input-wrapper">
                <input type="text" id="locationInput" placeholder="Introduzca una ubicación" class="location-input">
                <button id="searchLocationBtn" class="search-location-btn">🔍</button>
            </div>

            <!-- Lista dinámica de tiendas -->
            <div id="storesList" class="stores-list">
                <!-- Se llena con JS -->
            </div>

        </div>

        <!-- Columna derecha: Mapa real -->
        <div class="map-column">
            <div class="map-card">
                <h3 class="map-title">📍 Nuestras sedes</h3>
                <div class="locations-list" id="locationsList">
                    <!-- Lista de barrios/ubicaciones del mapa -->
                </div>
                <!-- Contenedor del mapa real -->
                <div id="realMap" style="width: 100%; height: 400px; border-radius: 16px; margin-top: 1rem;"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2025 Burguer Tentación. Todos los derechos reservados.</p>
    </footer>

    <script src="script_sedes.js"></script>
</body>
</html>
